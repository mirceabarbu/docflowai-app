<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>DocFlowAI — Autentificare</title>
  <style>
    body{display:flex;align-items:center;justify-content:center;}
    .wrap{width:100%;max-width:400px;padding:20px;}
    .card{backdrop-filter:blur(14px);padding:44px 40px 36px;max-width:400px;}
    .logo{text-align:center;margin-bottom:34px;}
    .logo-icon{width:52px;height:52px;border-radius:14px;margin:0 auto 12px;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      display:flex;align-items:center;justify-content:center;font-size:24px;}
    .logo-name{font-size:1.5rem;font-weight:800;letter-spacing:-.03em;}
    .logo-sub{font-size:.78rem;color:var(--muted);margin-top:3px;}
    h1{font-size:.95rem;color:var(--sub);text-align:center;margin-bottom:26px;font-weight:500;}
    .btn{width:100%;padding:13px;margin-top:24px;font-size:1rem;}
  </style>
  <link rel="stylesheet" href="/styles.css"/>
</head>
<body>
<header style="position:fixed;top:0;left:0;width:100%;padding:14px 24px;z-index:100;background:rgba(11,16,32,.75);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.07);">
  <img src="/Logo.png" alt="DocFlowAI" style="height:110px;width:auto;object-fit:contain;display:block;" />
</header>
<div class="wrap" style="padding-top:100px;">
  <div class="card">
    <div class="logo">
      <div class="logo-sub" style="margin-top:4px;">Sistem de semnare electronică calificată</div>
    </div>
    <h1>Autentificare în cont</h1>
    <label for="email">Adresă email</label>
    <input id="email" type="email" placeholder="nume@institutie.ro" autocomplete="email"/>
    <label for="password">Parolă</label>
    <input id="password" type="password" placeholder="••••••••" autocomplete="current-password"/>
    <button class="btn" id="btnLogin">Intră în cont</button>
    <div class="err" id="errMsg"></div>
  </div>
</div>
<script>
  const $=id=>document.getElementById(id);
  // Dacă e deja logat, redirecționează
  const tok=localStorage.getItem("docflow_token");
  if(tok){
    fetch("/auth/me",{headers:{"Authorization":"Bearer "+tok}})
      .then(r=>r.ok?r.json():null)
      .then(u=>{if(u)location.href=u.role==="admin"?"/admin":"/"})
      .catch(()=>{});
  }
  function showErr(msg){const el=$("errMsg");el.textContent=msg;el.style.display="block";}
  async function login(){
    const email=$("email").value.trim(),password=$("password").value;
    const btn=$("btnLogin");
    $("errMsg").style.display="none";
    if(!email||!password){showErr("Completează emailul și parola.");return;}
    btn.disabled=true;btn.innerHTML='<span class="spin"></span>Se verifică...';
    try{
      const r=await fetch("/auth/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email,password})});
      const d=await r.json();
      if(!r.ok){
        if(d.error==="too_many_attempts"){
          const min=Math.ceil((d.remainSec||900)/60);
          showErr(`⛔ Prea multe încercări eșuate. Contul este blocat temporar. Încearcă din nou în ${min} minute.`);
          // Countdown
          let sec=d.remainSec||900;
          const iv=setInterval(()=>{
            sec--;
            if(sec<=0){clearInterval(iv);$("errMsg").style.display="none";return;}
            const m2=Math.floor(sec/60),s2=sec%60;
            $("errMsg").textContent=`⛔ Prea multe încercări eșuate. Încearcă din nou în ${m2}:${String(s2).padStart(2,"0")}.`;
          },1000);
          return;
        }
        const m={invalid_credentials:"Email sau parolă incorectă.",db_not_ready:"Baza de date nu este disponibilă."};
        showErr(m[d.error]||"Eroare de autentificare.");return;
      }
      localStorage.setItem("docflow_token",d.token);
      localStorage.setItem("docflow_user",JSON.stringify({email:d.email,role:d.role,nume:d.nume,functie:d.functie,institutie:d.institutie||""}));
      const next=new URLSearchParams(location.search).get("next");
      location.href=d.role==="admin"?(next&&next.startsWith("/admin")?next:"/admin"):(next||"/");
    }catch(e){showErr("Eroare de rețea.");}
    finally{btn.disabled=false;btn.textContent="Intră în cont";}
  }
  $("btnLogin").addEventListener("click",login);
  $("password").addEventListener("keydown",e=>{if(e.key==="Enter")login();});
  $("email").addEventListener("keydown",e=>{if(e.key==="Enter")$("password").focus();});
</script>
<script src="/ui.js"></script>
</body>
</html>
