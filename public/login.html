<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>DocFlowAI — Autentificare</title>
  <link rel="stylesheet" href="/css/df/tokens.css?v=3.9.366">
  <link rel="stylesheet" href="/css/df/components.css?v=3.9.366">
  <link rel="stylesheet" href="/css/login/login.css?v=3.9.366">
  <link rel="stylesheet" href="/mobile.css?v=3.9.366">
  <script src="/js/df-utils.js?v=3.9.343"></script>
</head>
<body>
<header style="position:fixed;top:0;left:0;width:100%;padding:10px 24px;z-index:100;background:rgba(11,16,32,.75);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;">
  <img src="/Logo.png" alt="DocFlowAI" style="height:87px;width:auto;object-fit:contain;display:block;" />
</header>
<div class="wrap" style="padding-top:107px;">
  <div class="card">
    <div class="logo">
      <div class="logo-sub" style="margin-top:4px;">Sistem de semnare electronică calificată</div>
    </div>
    <h1>Autentificare în cont</h1>
    <label for="email">Adresă email</label>
    <input id="email" type="email" placeholder="nume@institutie.ro" autocomplete="email"/>
    <label for="password">Parolă</label>
    <input id="password" type="password" placeholder="••••••••" autocomplete="current-password"/>
    <button class="df-action-btn cta full-width" id="btnLogin">Intră în cont</button>
    <div class="err" id="errMsg"></div>
  </div>
</div>
<script src="/js/login/login.js?v=3.9.332"></script>
</body>
</html>
