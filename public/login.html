<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>DocFlowAI — Autentificare</title>
  <link rel="stylesheet" href="/css/main.css"/>
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(900px 600px at 20% 10%, rgba(124,92,255,.28), transparent 60%),
                  radial-gradient(700px 500px at 80% 85%, rgba(45,212,191,.16), transparent 55%),
                  var(--color-bg);
    }
    .login-wrap {
      width: 100%;
      max-width: 400px;
      padding: 20px;
    }
    .login-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 20px;
      box-shadow: 0 24px 64px rgba(0,0,0,.4);
      padding: 44px 40px 36px;
      backdrop-filter: blur(14px);
    }
    .login-logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .login-logo-icon {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      margin: 0 auto 12px;
      background: linear-gradient(135deg, var(--color-primary), var(--color-secondary));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }
    .login-logo-name {
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: -.03em;
    }
    .login-logo-sub {
      font-size: .78rem;
      color: var(--color-muted);
      margin-top: 3px;
    }
    .login-title {
      font-size: .95rem;
      color: var(--color-text-secondary);
      text-align: center;
      margin-bottom: 24px;
      font-weight: 500;
    }
    #login-error {
      margin-bottom: 16px;
    }
    #mfa-section {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--color-border);
    }
    .login-footer {
      text-align: center;
      margin-top: 20px;
      font-size: .78rem;
      color: var(--color-muted);
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">
        <div class="login-logo-icon">🔐</div>
        <div class="login-logo-name">DocFlowAI</div>
        <div class="login-logo-sub">Platformă semnătură electronică calificată</div>
      </div>

      <p class="login-title">Autentificați-vă în contul dumneavoastră</p>

      <div id="login-error" class="hidden"></div>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="email" class="form-label">Adresă email</label>
          <input
            id="email"
            name="email"
            type="email"
            class="input"
            placeholder="utilizator@institutie.ro"
            autocomplete="email"
            required
          />
        </div>

        <div class="form-group">
          <label for="password" class="form-label">Parolă</label>
          <input
            id="password"
            name="password"
            type="password"
            class="input"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          />
        </div>

        <button id="login-btn" type="submit" class="btn btn-primary" style="width:100%;margin-top:8px">
          Autentificare
        </button>
      </form>

      <div id="mfa-section" class="hidden">
        <div class="form-group">
          <label for="totp-code" class="form-label">Cod autentificator (TOTP)</label>
          <input
            id="totp-code"
            type="text"
            class="input"
            placeholder="123456"
            inputmode="numeric"
            maxlength="6"
            autocomplete="one-time-code"
          />
        </div>
        <button id="mfa-btn" class="btn btn-primary" style="width:100%;margin-top:8px">
          Verifică codul
        </button>
      </div>

      <div class="login-footer">
        &copy; 2024 MIM Labs · DocFlowAI v4
      </div>
    </div>
  </div>

  <script type="module" src="/js/modules/auth/login.js"></script>
</body>
</html>
