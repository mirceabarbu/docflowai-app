<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>DocFlowAI — Flow</title>
  <style>
    :root{
      --bg1:#070b1b; --bg2:#0b1230; --stroke:rgba(255,255,255,.10);
      --txt:#eaf0ff; --sub:rgba(234,240,255,.78);
      --accent:#7c5cff; --ok:#26d07c; --warn:#ffb020; --bad:#ff4d5a;
      --shadow:0 20px 60px rgba(0,0,0,.40);
      --r:18px;
    }
    *{box-sizing:border-box}
    body{
      margin:0; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      color:var(--txt);
      background:
        radial-gradient(900px 500px at 20% 10%, rgba(124,92,255,.28), transparent 55%),
        radial-gradient(700px 500px at 80% 20%, rgba(0,214,255,.20), transparent 55%),
        radial-gradient(700px 600px at 70% 90%, rgba(124,92,255,.18), transparent 60%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
      min-height:100vh;
    }
    a{color:inherit}
    code{background:rgba(255,255,255,.08);padding:2px 6px;border-radius:8px;border:1px solid var(--stroke)}
    .wrap{max-width:1180px;margin:28px auto;padding:0 18px 56px;}
    .topbar{
      display:flex; align-items:center; justify-content:space-between;
      gap:12px; padding:14px 16px; border:1px solid var(--stroke);
      background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border-radius:22px; box-shadow: var(--shadow);
    }
    .brand{display:flex;align-items:center;gap:12px;min-width:0}
    .logo{
      width:44px;height:44px;border-radius:14px;display:grid;place-items:center;
      background: radial-gradient(70% 70% at 30% 30%, rgba(124,92,255,.55), rgba(124,92,255,.18));
      border:1px solid rgba(124,92,255,.40);
      flex:0 0 auto;
    }
    .brand .t{display:flex;flex-direction:column;min-width:0}
    .brand .t .h{font-weight:800;letter-spacing:.2px;line-height:1.05}
    .brand .t .s{font-size:.82rem;color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:flex-end}
    .btn{
      border:1px solid var(--stroke);
      background:rgba(255,255,255,.06);
      color:var(--txt);
      padding:10px 12px; border-radius:14px;
      cursor:pointer; user-select:none;
      display:inline-flex; align-items:center; gap:8px;
      transition:transform .06s ease, background .15s ease, border-color .15s ease, opacity .15s ease;
      font-weight:650; font-size:.92rem;
    }
    .btn:hover{background:rgba(255,255,255,.08)}
    .btn:active{transform:translateY(1px)}
    .btn.primary{
      background:linear-gradient(90deg, rgba(124,92,255,.95), rgba(0,214,255,.55));
      border-color:rgba(124,92,255,.35);
    }
    .btn.ghost{background:transparent}
    .pill{
      display:inline-flex;align-items:center;gap:8px;
      border:1px solid var(--stroke);
      background:rgba(255,255,255,.05);
      padding:7px 10px;border-radius:999px;font-size:.85rem;color:var(--sub);
      max-width:100%;
    }
    .pill strong{color:var(--txt);font-weight:750}
    
    /* MODIFICĂRI LAYOUT FULL-WIDTH */
    .grid {
      display: flex;
      flex-direction: column;
      gap: 24px;
      margin-top: 24px;
    }
    .card {
      width: 100%;
      border: 1px solid var(--stroke);
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border-radius: var(--r); 
      box-shadow: var(--shadow);
      padding: 24px;
    }
    .details-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 32px;
    }
    @media (max-width: 900px) {
      .details-layout { grid-template-columns: 1fr; }
      .signers-border-mobile { border-left: none !important; padding-left: 0 !important; border-top: 1px solid rgba(255,255,255,0.08); padding-top: 24px; }
    }
    .events-card { margin-top: 8px; }
    .events { max-height: 400px; overflow: auto; padding-right: 4px; }
    /* FINISAJE ENTERPRISE */
    .sep { height: 1px; background: rgba(255,255,255,.08); margin: 20px 0; }
    .list { display:flex; flex-direction:column; gap: 12px; margin-top: 10px; }
    .item {
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.03);
      border-radius: 14px;
      padding: 14px 18px;
    }
    h3 {
      font-size: 1.1rem; letter-spacing: 0.5px; text-transform: uppercase;
      color: var(--sub); margin: 0 0 16px 0 !important;
    }
    /* Restul stilurilor existente */
    .row{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
    .muted{color:var(--sub)}
    .small{font-size:.86rem}
    .badge{
      display:inline-flex;align-items:center;gap:7px;
      padding:7px 10px;border-radius:999px;
      font-size:.85rem;font-weight:700;border:1px solid var(--stroke);
      background:rgba(255,255,255,.05);
    }
    .badge.ok{border-color:rgba(38,208,124,.45); background:rgba(38,208,124,.10)}
    .badge.warn{border-color:rgba(255,176,32,.45); background:rgba(255,176,32,.10)}
    .badge.bad{border-color:rgba(255,77,90,.45); background:rgba(255,77,90,.10)}
    .kv{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
    .item .top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
    .item .name{font-weight:750}
    .item .meta{color:var(--sub);font-size:.86rem;margin-top:3px}
    .item .right{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end}
    .events::-webkit-scrollbar{height:10px;width:10px}
    .events::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:10px}
    .events .ev{display:flex;gap:10px;padding:8px 10px;border-radius:12px}
    .events .ev:hover{background:rgba(255,255,255,.04)}
    .events .ts{color:rgba(234,240,255,.55);font-variant-numeric:tabular-nums;min-width:140px}
    .events .txt{color:var(--sub)}
    .alert{
      border:1px solid rgba(124,92,255,.30);
      background:rgba(124,92,255,.08);
      color:rgba(234,240,255,.92);
      padding:10px 12px; border-radius:14px;
      margin-top:12px;
    }
    .alert.err{
      border-color:rgba(255,77,90,.35);
      background:rgba(255,77,90,.08);
      color:rgba(255,240,242,.95);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="brand">
        <div class="logo">🛡️</div>
        <div class="t">
          <div class="h">DocFlowAI</div>
          <div class="s" id="subtitle">Vizualizare flow</div>
        </div>
      </div>
      <div class="actions">
        <span class="pill" id="pillFlow" title="ID Flow"><strong>Flow</strong> —</span>
        <button class="btn ghost" id="btnBack">↩️ Înapoi</button>
        <button class="btn" id="btnRefresh">🔄 Refresh</button>
        <button class="btn primary" id="btnDownloadSigned">⬇️ PDF semnat</button>
        <button class="btn" id="btnDownloadOriginal" title="Descarcă PDF original (dacă există)">📎 PDF original</button>
      </div>
    </div>

    <div id="msg"></div>

    <div class="grid">
      <div class="card">
        <div class="details-layout">
          
          <div>
            <div class="row">
              <h3>Informații Document</h3>
              <span class="badge" id="badgeStatus">—</span>
            </div>
            <div class="kv">
              <span class="pill"><strong>Document</strong> <span id="docName">—</span></span>
              <span class="pill"><strong>Inițiator</strong> <span id="initName">—</span></span>
              <span class="pill"><strong>Instituție</strong> <span id="inst">—</span></span>
              <span class="pill"><strong>Compartiment</strong> <span id="compartiment">—</span></span>
              <span class="pill"><strong>Actualizat</strong> <span id="updatedAt">—</span></span>
            </div>

            <div class="alert small" id="hintSigner" style="display:none; margin-top:20px;">
              💡 E
