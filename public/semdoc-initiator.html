<!doctype html>
<html lang="ro">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>DocFlowAI — Inițiere flux</title>
    <style>
      body { font-family: system-ui, Arial; margin: 0; background:#0b0f17; color:#e9eefc; }
      header { padding: 18px 20px; border-bottom: 1px solid rgba(255,255,255,.08); display:flex; gap:12px; align-items:center; }
      .brand { font-weight: 800; letter-spacing:.2px; }
      .tabs { display:flex; gap:8px; margin-left:auto; }
      button, input, select { font: inherit; }
      .tabbtn { background: rgba(255,255,255,.06); color:#e9eefc; border:1px solid rgba(255,255,255,.10); padding:8px 12px; border-radius:10px; cursor:pointer; }
      .tabbtn.active { background: rgba(120,160,255,.22); border-color: rgba(120,160,255,.45); }
      main { padding: 18px 20px; max-width: 1100px; margin: 0 auto; }
      .card { background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.08); border-radius: 14px; padding: 14px; margin-bottom: 14px; }
      .grid { display:grid; gap:10px; grid-template-columns: repeat(12, 1fr); }
      .col-3 { grid-column: span 3; } .col-4 { grid-column: span 4; } .col-6 { grid-column: span 6; } .col-12 { grid-column: span 12; }
      label { display:block; font-size: 12px; opacity:.85; margin-bottom:6px; }
      input, select { width:100%; padding:10px 10px; border-radius:10px; border:1px solid rgba(255,255,255,.12); background: rgba(0,0,0,.2); color:#e9eefc; }
      .row { display:flex; gap:10px; align-items:center; }
      .btn { background: rgba(120,160,255,.22); border:1px solid rgba(120,160,255,.45); color:#e9eefc; padding:10px 12px; border-radius: 12px; cursor:pointer; }
      .btn.secondary { background: rgba(255,255,255,.06); border-color: rgba(255,255,255,.12); }
      .btn.danger { background: rgba(255,90,120,.18); border-color: rgba(255,90,120,.35); }
      table { width:100%; border-collapse: collapse; }
      th, td { text-align:left; padding:10px; border-bottom:1px solid rgba(255,255,255,.08); vertical-align: top; }
      th { font-size: 12px; opacity:.85; }
      .muted { opacity:.8; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .pill { display:inline-block; padding:3px 8px; border-radius:999px; border:1px solid rgba(255,255,255,.12); background: rgba(255,255,255,.05); font-size: 12px; }
      .ok { border-color: rgba(90,255,160,.35); background: rgba(90,255,160,.12); }
      .warn { border-color: rgba(255,210,90,.35); background: rgba(255,210,90,.12); }
      .bad { border-color: rgba(255,90,120,.35); background: rgba(255,90,120,.12); }
      a { color: #a9c2ff; }
      .hidden { display:none; }
      .statusBox { white-space: pre-wrap; background: rgba(0,0,0,.25); border:1px solid rgba(255,255,255,.08); padding:10px; border-radius:12px; }
    </style>
  </head>
  <body>
    <header>
      <div class="brand">DocFlowAI / SemDoc</div>
      <div class="tabs">
        <button id="tabInit" class="tabbtn active" type="button">Inițiere</button>
        <button id="tabStatus" class="tabbtn" type="button">Status</button>
      </div>
    </header>

    <main>
      <!-- INIT -->
      <section id="viewInit">
        <div class="card">
          <div class="grid">
            <div class="col-4">
              <label>Document (denumire)</label>
              <input id="docName" placeholder="Ex: Referat de necesitate..." />
            </div>
            <div class="col-4">
              <label>Inițiator (nume)</label>
              <input id="initName" placeholder="Ex: Mircea Barbu" />
            </div>
            <div class="col-4">
              <label>Inițiator (email)</label>
              <input id="initEmail" placeholder="Ex: mircea@..." />
            </div>

            <div class="col-12">
              <div class="row" style="justify-content: space-between;">
                <div class="muted">Semnatari (în ordine). La creare, primul devine <span class="pill warn">current</span>.</div>
                <div class="row">
                  <button id="btnAdd" class="btn secondary" type="button">+ Adaugă rând</button>
                  <button id="btnDefaults" class="btn secondary" type="button">Roluri implicite</button>
                </div>
              </div>
            </div>

            <div class="col-12">
              <table>
                <thead>
                  <tr>
                    <th style="width:140px;">ATRIBUT</th>
                    <th style="width:200px;">FUNCȚIE</th>
                    <th>NUME ȘI PRENUME</th>
                    <th style="width:280px;">EMAIL</th>
                    <th style="width:110px;"></th>
                  </tr>
                </thead>
                <tbody id="signersTbody"></tbody>
              </table>
            </div>

            <div class="col-12">
              <div class="row">
                <button id="btnCreate" class="btn" type="button">Pornește flux</button>
                <button id="btnOpenStatus" class="btn secondary" type="button">Deschide Status</button>
                <span id="createResult" class="muted"></span>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- STATUS -->
      <section id="viewStatus" class="hidden">
        <div class="card">
          <div class="row" style="justify-content: space-between;">
            <div>
              <div class="muted">Flow curent:</div>
              <div class="mono" id="statusFlowId">—</div>
            </div>
            <div class="row">
              <button id="btnRefresh" class="btn secondary" type="button">Refresh</button>
              <button id="btnClear" class="btn danger" type="button">Clear flow</button>
            </div>
          </div>
          <div style="height:10px"></div>
          <div id="statusContent" class="statusBox">Niciun flux încă.</div>
        </div>
      </section>
    </main>

    <script>
      const $ = (id) => document.getElementById(id);

      // Tabs
      function showTab(name) {
        const isInit = name === "init";
        $("viewInit").classList.toggle("hidden", !isInit);
        $("viewStatus").classList.toggle("hidden", isInit);
        $("tabInit").classList.toggle("active", isInit);
        $("tabStatus").classList.toggle("active", !isInit);
        if (!isInit) refreshStatus();
      }
      $("tabInit").addEventListener("click", () => showTab("init"));
      $("tabStatus").addEventListener("click", () => showTab("status"));

      // Signers table
      const tbody = $("signersTbody");

      function signerRowTemplate(s = {}) {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>
            <select class="rol">
              <option value="ÎNTOCMIT">ÎNTOCMIT</option>
              <option value="VIZAT">VIZAT</option>
              <option value="APROBAT">APROBAT</option>
              <option value="AVIZAT">AVIZAT</option>
            </select>
          </td>
          <td><input class="functie" placeholder="Ex: Șef structură" /></td>
          <td><input class="name" placeholder="Ex: Popescu Ion" /></td>
          <td><input class="email" placeholder="Ex: nume@institutie.ro" /></td>
          <td><button class="btn danger btnDel" type="button">Șterge</button></td>
        `;
        tr.querySelector(".rol").value = (s.rol || s.atribut || "ÎNTOCMIT");
        tr.querySelector(".functie").value = (s.functie || "");
        tr.querySelector(".name").value = (s.name || "");
        tr.querySelector(".email").value = (s.email || "");
        tr.querySelector(".btnDel").addEventListener("click", () => tr.remove());
        return tr;
      }

      function setDefaults() {
        tbody.innerHTML = "";
        const defaults = [
          { rol: "ÎNTOCMIT", functie: "Întocmit", name: "", email: "" },
          { rol: "VIZAT", functie: "Șef structură", name: "", email: "" },
          { rol: "APROBAT", functie: "Conducător", name: "", email: "" },
        ];
        defaults.forEach(d => tbody.appendChild(signerRowTemplate(d)));
      }

      $("btnAdd").addEventListener("click", () => tbody.appendChild(signerRowTemplate()));
      $("btnDefaults").addEventListener("click", setDefaults);

      // Default load
      setDefaults();

      function readSigners() {
        const rows = [...tbody.querySelectorAll("tr")];
        return rows.map((tr, i) => ({
          order: i + 1,
          rol: tr.querySelector(".rol").value,
          functie: tr.querySelector(".functie").value.trim(),
          name: tr.querySelector(".name").value.trim(),
          email: tr.querySelector(".email").value.trim(),
        })).filter(s => s.rol && (s.name || s.email));
      }

      // Create flow
      $("btnCreate").addEventListener("click", async () => {
        $("createResult").textContent = "Se creează...";
        const payload = {
          docName: $("docName").value.trim(),
          initName: $("initName").value.trim(),
          initEmail: $("initEmail").value.trim(),
          signers: readSigners(),
        };

        try {
          const r = await fetch("/flows", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          const j = await r.json().catch(() => ({}));
          if (!r.ok) throw new Error(j?.error || "server_error");

          localStorage.setItem("lastFlowId", j.flowId);
          $("createResult").innerHTML = `✅ Flow creat: <span class="mono">${j.flowId}</span>`;

          if (j.signerLink) {
            $("createResult").innerHTML += ` · <a href="${j.signerLink}" target="_blank">Deschide link semnare (primul)</a>`;
          }

        } catch (e) {
          $("createResult").textContent = `❌ Eroare: ${String(e.message || e)}`;
        }
      });

      $("btnOpenStatus").addEventListener("click", () => showTab("status"));
      $("btnRefresh").addEventListener("click", refreshStatus);

      $("btnClear").addEventListener("click", () => {
        localStorage.removeItem("lastFlowId");
        $("statusFlowId").textContent = "—";
        $("statusContent").textContent = "Niciun flux încă.";
      });

      function getFlowIdFromQueryOrStorage() {
        const params = new URLSearchParams(location.search);
        return params.get("flow") || localStorage.getItem("lastFlowId") || "";
      }

      async function refreshStatus() {
        const flowId = getFlowIdFromQueryOrStorage();
        $("statusFlowId").textContent = flowId || "—";
        if (!flowId) {
          $("statusContent").textContent = "Niciun flux activ. Creează unul din tabul Inițiere.";
          return;
        }

        $("statusContent").textContent = "Se încarcă...";
        try {
          const r = await fetch(`/flows/${encodeURIComponent(flowId)}`);
          const j = await r.json().catch(() => ({}));
          if (!r.ok) throw new Error(j?.error || "server_error");

          const lines = [];
          lines.push(`Document: ${j.docName}`);
          lines.push(`Inițiator: ${j.initName} <${j.initEmail}>`);
          lines.push(`Actualizat: ${j.updatedAt}`);
          lines.push("");
          lines.push("Semnatari:");

          (j.signers || []).forEach((s, i) => {
            const st = s.status || "pending";
            const pill = st === "signed" ? "signed" : (st === "current" ? "current" : "pending");
            lines.push(
              `  ${i+1}. [${pill}] ${s.rol || ""} / ${s.functie || ""} — ${s.name || ""} <${s.email || ""}>` +
              (s.signedAt ? ` (signedAt: ${s.signedAt})` : "")
            );

            if (s.token) {
              const link = `/semdoc-signer.html?flow=${encodeURIComponent(j.flowId)}&token=${encodeURIComponent(s.token)}`;
              lines.push(`      link: ${link}`);
            }
          });

          lines.push("");
          lines.push("Evenimente:");
          (j.events || []).slice(-10).forEach(ev => {
            lines.push(`  - ${ev.at} :: ${ev.type} :: ${ev.by || ""}`);
          });

          $("statusContent").textContent = lines.join("\n");
        } catch (e) {
          $("statusContent").textContent = `❌ Eroare status: ${String(e.message || e)}`;
        }
      }

      if (new URLSearchParams(location.search).get("flow")) {
        showTab("status");
      }
    </script>
  </body>
</html>
