<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>ALOP — DocFlowAI</title>
  <link rel="stylesheet" href="/css/main.css"/>
  <style>
    .alop-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--color-surface);
      border-bottom: 1px solid var(--color-border);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      backdrop-filter: blur(10px);
    }
    .alop-title {
      font-size: 1rem;
      font-weight: 700;
      flex: 1;
    }
    .alop-title small {
      display: block;
      font-size: .75rem;
      font-weight: 400;
      color: var(--color-muted);
    }
    .alop-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .alop-main {
      max-width: 900px;
      margin: 28px auto;
      padding: 0 20px 80px;
    }
    .total-bar {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .total-label {
      font-size: .9rem;
      color: var(--color-muted);
    }
    .total-value {
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--color-primary);
    }
    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    @media (max-width: 600px) {
      .field-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- ── Header ─────────────────────────────────────────────────────────── -->
  <header class="alop-header">
    <div class="alop-title">
      ALOP — Angajare, Lichidare, Ordonanțare și Plată
      <small>Formular ALOP-2024 · <span id="instance-id-display"></span></small>
    </div>
    <div class="alop-actions">
      <span id="autosave-indicator" class="autosave-indicator"></span>
      <button id="save-btn" class="btn btn-ghost btn-sm">💾 Salvează</button>
      <button id="validate-btn" class="btn btn-ghost btn-sm">✓ Validează</button>
      <button id="generate-pdf-btn" class="btn btn-primary btn-sm">📄 Generează PDF</button>
      <a href="javascript:history.back()" class="btn btn-ghost btn-sm">← Înapoi</a>
    </div>
  </header>

  <!-- ── Main ───────────────────────────────────────────────────────────── -->
  <main class="alop-main">

    <!-- Total valoare -->
    <div class="total-bar">
      <span class="total-label">Valoare totală document</span>
      <span class="total-value" id="total-valoare">0,00 RON</span>
    </div>

    <!-- ── SECȚIUNEA A — Date generale ─────────────────────────────────── -->
    <div class="accordion open" id="section-A">
      <div class="accordion-header">
        <span>A. Date generale</span>
        <span class="accordion-icon">▼</span>
      </div>
      <div class="accordion-body">

        <div class="field-row">
          <div class="form-group">
            <label class="form-label">Denumire instituție <span style="color:var(--color-danger)">*</span></label>
            <input data-field="sectionA.institutie" type="text" class="input" placeholder="ex: Primăria Municipiului..." required/>
          </div>
          <div class="form-group">
            <label class="form-label">CIF / CUI</label>
            <input data-field="sectionA.cif" type="text" class="input" placeholder="ex: 4269232"/>
          </div>
        </div>

        <div class="field-row">
          <div class="form-group">
            <label class="form-label">Număr document <span style="color:var(--color-danger)">*</span></label>
            <input data-field="sectionA.numarDocument" type="text" class="input" placeholder="ex: 1234/2024" required/>
          </div>
          <div class="form-group">
            <label class="form-label">Data document <span style="color:var(--color-danger)">*</span></label>
            <input data-field="sectionA.dataDocument" type="date" class="input" required/>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Descriere angajament</label>
          <textarea data-field="sectionA.descriere" class="input" rows="3" placeholder="Descrieți obiectul angajamentului bugetar..."></textarea>
        </div>

        <div class="field-row">
          <div class="form-group">
            <label class="form-label">Clasificație bugetară</label>
            <input data-field="sectionA.clasificatieBugetara" type="text" class="input" placeholder="ex: 51.02.01"/>
          </div>
          <div class="form-group">
            <label class="form-label">Subdiviziune bugetară</label>
            <input data-field="sectionA.subdiviziune" type="text" class="input" placeholder="ex: 20.01.01"/>
          </div>
        </div>

        <div class="field-row">
          <div class="form-group">
            <label class="form-label">Sursa de finanțare</label>
            <select data-field="sectionA.sursa" class="select">
              <option value="">Selectați sursa...</option>
              <option value="buget_local">Buget local</option>
              <option value="buget_stat">Buget de stat</option>
              <option value="fonduri_europene">Fonduri europene</option>
              <option value="venituri_proprii">Venituri proprii</option>
              <option value="alte_surse">Alte surse</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">An bugetar</label>
            <input data-field="sectionA.anBugetar" type="number" class="input" placeholder="2024" min="2020" max="2035"/>
          </div>
        </div>

      </div>
    </div>

    <!-- ── SECȚIUNEA B — Date financiare ───────────────────────────────── -->
    <div class="accordion" id="section-B">
      <div class="accordion-header">
        <span>B. Date financiare</span>
        <span class="accordion-icon">▼</span>
      </div>
      <div class="accordion-body">

        <div class="field-row">
          <div class="form-group">
            <label class="form-label">Valoare factură (RON) <span style="color:var(--color-danger)">*</span></label>
            <input data-field="sectionB.valoareFactura" type="number" class="input" placeholder="0.00" step="0.01" min="0" required/>
          </div>
          <div class="form-group">
            <label class="form-label">TVA inclus (RON)</label>
            <input data-field="sectionB.tva" type="number" class="input" placeholder="0.00" step="0.01" min="0"/>
          </div>
        </div>

        <div class="field-row">
          <div class="form-group">
            <label class="form-label">Număr factură <span style="color:var(--color-danger)">*</span></label>
            <input data-field="sectionB.numarFactura" type="text" class="input" placeholder="ex: FX-12345" required/>
          </div>
          <div class="form-group">
            <label class="form-label">Data factură</label>
            <input data-field="sectionB.dataFactura" type="date" class="input"/>
          </div>
        </div>

        <div class="field-row">
          <div class="form-group">
            <label class="form-label">Furnizor / Prestator <span style="color:var(--color-danger)">*</span></label>
            <input data-field="sectionB.furnizor" type="text" class="input" placeholder="Denumire furnizor" required/>
          </div>
          <div class="form-group">
            <label class="form-label">CIF Furnizor</label>
            <input data-field="sectionB.cifFurnizor" type="text" class="input" placeholder="ex: RO12345678"/>
          </div>
        </div>

        <div class="field-row">
          <div class="form-group">
            <label class="form-label">Număr contract</label>
            <input data-field="sectionB.numarContract" type="text" class="input" placeholder="ex: 456/2024"/>
          </div>
          <div class="form-group">
            <label class="form-label">Data contract</label>
            <input data-field="sectionB.dataContract" type="date" class="input"/>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">IBAN cont plată</label>
          <input data-field="sectionB.iban" type="text" class="input" placeholder="ex: RO49AAAA1B31007593840000"/>
        </div>

        <div class="form-group">
          <label class="form-label">Modalitate plată</label>
          <select data-field="sectionB.modalittatePlata" class="select">
            <option value="">Selectați...</option>
            <option value="ordin_plata">Ordin de plată</option>
            <option value="cec">CEC</option>
            <option value="bilet_ordin">Bilet la ordin</option>
            <option value="numerar">Numerar (casierie)</option>
          </select>
        </div>

      </div>
    </div>

    <!-- ── SECȚIUNEA C — Angajare ────────────────────────────────────── -->
    <div class="accordion" id="section-C">
      <div class="accordion-header">
        <span>C. Angajare</span>
        <span class="accordion-icon">▼</span>
      </div>
      <div class="accordion-body">

        <div class="form-group">
          <label class="form-label">Tipul angajamentului <span style="color:var(--color-danger)">*</span></label>
          <select data-field="sectionC.tipAngajament" class="select" required>
            <option value="">Selectați tipul...</option>
            <option value="individual">Individual</option>
            <option value="global">Global</option>
            <option value="multianual">Multianual</option>
          </select>
        </div>

        <div class="field-row">
          <div class="form-group">
            <label class="form-label">Număr propunere angajare</label>
            <input data-field="sectionC.numarPropunere" type="text" class="input" placeholder="ex: PA-789/2024"/>
          </div>
          <div class="form-group">
            <label class="form-label">Data propunere angajare</label>
            <input data-field="sectionC.dataPropunere" type="date" class="input"/>
          </div>
        </div>

        <div class="field-row">
          <div class="form-group">
            <label class="form-label">Valoare angajată (RON)</label>
            <input data-field="sectionC.valoareAngajata" type="number" class="input" placeholder="0.00" step="0.01" min="0"/>
          </div>
          <div class="form-group">
            <label class="form-label">Credit bugetar disponibil (RON)</label>
            <input data-field="sectionC.creditDisponibil" type="number" class="input" placeholder="0.00" step="0.01" min="0"/>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Număr angajament bugetar individual</label>
          <input data-field="sectionC.numarAngajamentBugetar" type="text" class="input" placeholder="ex: AB-001/2024"/>
        </div>

        <div class="form-group">
          <label class="form-label" style="display:flex;align-items:center;gap:8px;cursor:pointer">
            <input data-field="sectionC.vizaCFP" type="checkbox"/>
            Viză CFP pentru angajare
          </label>
        </div>

      </div>
    </div>

    <!-- ── SECȚIUNEA D — Lichidare ───────────────────────────────────── -->
    <div class="accordion" id="section-D">
      <div class="accordion-header">
        <span>D. Lichidare</span>
        <span class="accordion-icon">▼</span>
      </div>
      <div class="accordion-body">

        <div class="form-group">
          <label class="form-label" style="display:flex;align-items:center;gap:8px;cursor:pointer">
            <input data-field="sectionD.serviciiConforme" type="checkbox"/>
            Serviciile/bunurile livrate sunt conforme cu contractul
          </label>
        </div>

        <div class="form-group">
          <label class="form-label">Observații / neconformități</label>
          <textarea data-field="sectionD.observatii" class="input" rows="3" placeholder="Descrieți eventualele neconformități sau observații..."></textarea>
        </div>

        <div class="field-row">
          <div class="form-group">
            <label class="form-label">Data recepție</label>
            <input data-field="sectionD.dataReceptie" type="date" class="input"/>
          </div>
          <div class="form-group">
            <label class="form-label">Număr proces-verbal recepție</label>
            <input data-field="sectionD.numarProcesVerbal" type="text" class="input" placeholder="ex: PVR-22/2024"/>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Valoare lichidată (RON) <span style="color:var(--color-danger)">*</span></label>
          <input data-field="sectionD.valoareLichidare" type="number" class="input" placeholder="0.00" step="0.01" min="0" required/>
        </div>

        <div class="form-group">
          <label class="form-label" style="display:flex;align-items:center;gap:8px;cursor:pointer">
            <input data-field="sectionD.vizaCFPLichidare" type="checkbox"/>
            Viză CFP pentru lichidare
          </label>
        </div>

      </div>
    </div>

    <!-- ── SECȚIUNEA E — Ordonanțare și plată ───────────────────────── -->
    <div class="accordion" id="section-E">
      <div class="accordion-header">
        <span>E. Ordonanțare și plată</span>
        <span class="accordion-icon">▼</span>
      </div>
      <div class="accordion-body">

        <div class="field-row">
          <div class="form-group">
            <label class="form-label">Număr ordonanțare <span style="color:var(--color-danger)">*</span></label>
            <input data-field="sectionE.numarOrdonantare" type="text" class="input" placeholder="ex: OP-55/2024" required/>
          </div>
          <div class="form-group">
            <label class="form-label">Data ordonanțare</label>
            <input data-field="sectionE.dataOrdonantare" type="date" class="input"/>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Valoare ordonanțată (RON) <span style="color:var(--color-danger)">*</span></label>
          <input data-field="sectionE.valoareOrdonantare" type="number" class="input" placeholder="0.00" step="0.01" min="0" required/>
        </div>

        <div class="form-group">
          <label class="form-label">Scadență plată</label>
          <input data-field="sectionE.scadentaPlata" type="date" class="input"/>
        </div>

        <div class="form-group">
          <label class="form-label" style="display:flex;align-items:center;gap:8px;cursor:pointer">
            <input data-field="sectionE.vizaCFPOrdonantare" type="checkbox"/>
            Viză CFP pentru ordonanțare
          </label>
        </div>

        <div class="form-group">
          <label class="form-label">Observații ordonanțare / plată</label>
          <textarea data-field="sectionE.observatiiOrdonantare" class="input" rows="2" placeholder="Observații suplimentare..."></textarea>
        </div>

        <div class="form-group">
          <label class="form-label">Cod fiscal plătitor (după caz)</label>
          <input data-field="sectionE.codFiscalPlatitor" type="text" class="input" placeholder="ex: RO9999999"/>
        </div>

        <div class="field-row">
          <div class="form-group">
            <label class="form-label">Număr document plată</label>
            <input data-field="sectionE.numarDocumentPlata" type="text" class="input" placeholder="ex: OP-2024-001"/>
          </div>
          <div class="form-group">
            <label class="form-label">Data plată efectuată</label>
            <input data-field="sectionE.dataPlata" type="date" class="input"/>
          </div>
        </div>

      </div>
    </div>

  </main>

  <script type="module" src="/js/modules/forms/alop.js"></script>
  <script type="module">
    import { $ } from '/js/core/dom.js';

    // Show instance_id in header
    document.addEventListener('DOMContentLoaded', () => {
      const params = new URLSearchParams(location.search);
      const id = params.get('instance_id');
      const el = $('#instance-id-display');
      if (el && id) el.textContent = `Instanță #${id}`;
    });
  </script>
</body>
</html>
