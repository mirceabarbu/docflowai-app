<!doctype html>
<html lang="ro">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>DocFlowAI — Semnare</title>
    <style>
      *{box-sizing:border-box;}
body { font-family: system-ui, Arial; margin: 0; background:#0b0f17; color:#e9eefc; }
      header { padding: 18px 20px; border-bottom: 1px solid rgba(255,255,255,.08); }
      main { padding: 18px 20px; max-width: 900px; margin: 0 auto; }
      .card { background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.08); border-radius: 14px; padding: 14px; }
      .row { display:flex; gap:10px; align-items:center; flex-wrap: wrap; }
      .btn { background: rgba(120,160,255,.22); border:1px solid rgba(120,160,255,.45); color:#e9eefc; padding:10px 12px; border-radius: 12px; cursor:pointer; }
      .btn.secondary { background: rgba(255,255,255,.06); border-color: rgba(255,255,255,.12); }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .pill { display:inline-block; padding:3px 8px; border-radius:999px; border:1px solid rgba(255,255,255,.12); background: rgba(255,255,255,.05); font-size: 12px; }
      .muted { opacity:.85; }
      .box { background: rgba(0,0,0,.25); border:1px solid rgba(255,255,255,.08); border-radius:12px; padding:10px; }
      textarea { width:100%; min-height: 90px; padding:10px; border-radius: 12px; border:1px solid rgba(255,255,255,.12); background: rgba(0,0,0,.2); color:#e9eefc; }
      select option{background: var(--card); color: var(--text);} 

      a { color: #a9c2ff; }
      .hidden { display:none; }
    

/* ===== DocFlowAI Theme (from landing index.html) + UI polish ===== */
:root{
  --bg:#0b1020;
  --card:#0f1731;
  --muted:#9db0ff;
  --text:#eaf0ff;
  --sub:#cdd8ff;
  --line:rgba(255,255,255,.10);
  --accent:#7c5cff;
  --accent2:#2dd4bf;
  --shadow: 0 20px 60px rgba(0,0,0,.35);
  --radius:18px;
}

body{
  background:
    radial-gradient(900px 500px at 18% 8%, rgba(124,92,255,.35), transparent 60%),
    radial-gradient(700px 450px at 82% 12%, rgba(45,212,191,.22), transparent 55%),
    var(--bg) !important;
  color: var(--text) !important;
}

header{
  background: rgba(15,23,49,.55) !important;
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--line) !important;
}

.brand{ color: var(--text) !important; }
.muted, .card-sub, label{ color: var(--sub) !important; opacity: .9 !important; }
a{ color: var(--muted) !important; }

/* Cards / panels */
.card, .statusBox, .box{
  background: rgba(15,23,49,.72) !important;
  border: 1px solid var(--line) !important;
  border-radius: var(--radius) !important;
  box-shadow: var(--shadow);
}

/* Inputs */
input, select, textarea{
  background: rgba(255,255,255,.04) !important;
  color: var(--text) !important;
  border: 1px solid var(--line) !important;
  border-radius: 14px !important;
}
input::placeholder, textarea::placeholder{ color: rgba(205,216,255,.65) !important; }

input:focus, select:focus, textarea:focus{
  outline: none !important;
  border-color: rgba(124,92,255,.55) !important;
  box-shadow: 0 0 0 4px rgba(124,92,255,.18);
}

/* Tabs */
.tabbtn{
  background: rgba(255,255,255,.05) !important;
  border: 1px solid var(--line) !important;
  color: var(--text) !important;
  border-radius: 999px !important;
}
.tabbtn.active{
  background: rgba(124,92,255,.22) !important;
  border-color: rgba(124,92,255,.45) !important;
}

/* Buttons */
.btn{
  background: linear-gradient(135deg, var(--accent), var(--accent2)) !important;
  border: none !important;
  color: #fff !important;
  font-weight: 650;
  border-radius: 14px !important;
  box-shadow: 0 12px 30px rgba(0,0,0,.25);
}
.btn.secondary{
  background: rgba(255,255,255,.06) !important;
  border: 1px solid var(--line) !important;
  color: var(--text) !important;
  box-shadow: none !important;
}
.btn.danger{
  background: rgba(251,113,133,.15) !important;
  border: 1px solid rgba(251,113,133,.35) !important;
  color: var(--text) !important;
  box-shadow: none !important;
}
.btn:hover{ filter: brightness(1.05); transform: translateY(-1px); transition: .12s ease; }
.btn:active{ transform: translateY(0); }

/* Pills */
.pill, .kpi{
  background: rgba(255,255,255,.06) !important;
  border: 1px solid var(--line) !important;
  color: var(--sub) !important;
}

/* Tables */
th, td{ border-bottom: 1px solid rgba(255,255,255,.08) !important; }
th{ color: var(--sub) !important; }

/* Small niceties */
.mono{ color: var(--text) !important; }
#err{ border-color: rgba(251,113,133,.35) !important; }
/* ===== End theme ===== */
</style>
  </head>
  <body>
    <header>
      <div style="font-weight:800">DocFlowAI / SemDoc — Semnare</div>
      <div class="muted" id="sub">—</div>
    </header>

    <main>
      <div class="card">
        <div id="err" class="box hidden" style="border-color: rgba(255,90,120,.35);"></div>

        <div id="content">
          <div class="row" style="justify-content: space-between;">
            <div>
              <div class="muted">Document</div>
              <div id="docName" style="font-weight:700">—</div>
            </div>
            <div>
              <div class="muted">Flow</div>
              <div class="mono" id="flowId">—</div>
            </div>
          </div>

          <div style="height:12px"></div>

          <div class="box">
            <div class="row">
              <span class="pill" id="whoPill">—</span>
              <span class="muted" id="whoText">—</span>
            </div>
            <div style="height:10px"></div>
            <div class="muted">Semnătură (MVP):</div>
            <textarea id="signature" placeholder="Scrie 'Semnat' / nume / sau orice text (MVP)..."></textarea>

            <div style="height:12px"></div>
            <div class="row">
              <button id="btnSign" class="btn" type="button">Semnează</button>
              <button id="btnRefresh" class="btn secondary" type="button">Refresh</button>
              <span id="result" class="muted"></span>
            </div>
          </div>

          <div style="height:12px"></div>

          <div class="box">
            <div class="muted">Status rapid:</div>
            <pre id="quick" style="white-space: pre-wrap; margin: 0;"></pre>
          </div>

          <div style="height:12px"></div>

          <div class="muted">
            Dacă ai fost direcționat greșit, trimite inițiatorului link-ul complet din adresă (flow + token).
          </div>
        </div>
      </div>
    </main>

    <script>
      const $ = (id) => document.getElementById(id);

      function showError(msg) {
        $("err").classList.remove("hidden");
        $("err").textContent = "❌ " + msg;
      }

      const params = new URLSearchParams(location.search);
      const flow = params.get("flow");
      const token = params.get("token");

      if (!flow || !token) {
        showError("Link invalid. Lipsesc parametri (flow/token).");
        $("content").style.display = "none";
      } else {
        $("flowId").textContent = flow;
        $("sub").textContent = `flow=${flow} · token=${token.slice(0, 6)}…`;
      }

      let currentFlow = null;
      let signerIndex = -1;

      async function loadFlow() {
        if (!flow || !token) return;

        $("result").textContent = "Se încarcă...";
        const r = await fetch(`/flows/${encodeURIComponent(flow)}`);
        const j = await r.json().catch(() => ({}));
        if (!r.ok) throw new Error(j?.error || "server_error");

        currentFlow = j;
        signerIndex = (j.signers || []).findIndex(s => s.token === token);
        if (signerIndex === -1) throw new Error("Token invalid (nu corespunde niciunui semnatar).");

        $("docName").textContent = j.docName || "—";

        const s = j.signers[signerIndex];
        const who = `${s.rol || ""} / ${s.functie || ""}`;
        $("whoPill").textContent = (s.status || "pending").toUpperCase();
        $("whoText").textContent = `${who} — ${s.name || ""} <${s.email || ""}>`;

        const lines = [];
        lines.push(`Semnatar curent: ${j.signers.findIndex(x => x.status === "current") + 1}`);
        (j.signers || []).forEach((x, i) => {
          lines.push(`${i+1}. ${x.status || "pending"} :: ${x.rol || ""} :: ${x.name || ""}`);
        });
        $("quick").textContent = lines.join("\n");

        if (s.status !== "current") {
          $("btnSign").disabled = true;
          $("btnSign").style.opacity = 0.6;
          $("result").textContent = `Nu e rândul tău (status: ${s.status}).`;
        } else {
          $("btnSign").disabled = false;
          $("btnSign").style.opacity = 1;
          $("result").textContent = "";
        }
      }

      $("btnRefresh").addEventListener("click", async () => {
        try {
          await loadFlow();
        } catch (e) {
          showError(String(e.message || e));
        }
      });

      $("btnSign").addEventListener("click", async () => {
        try {
          if (!currentFlow) await loadFlow();
          const s = currentFlow.signers[signerIndex];
          if (s.status !== "current") throw new Error("Nu e rândul tău să semnezi.");

          $("result").textContent = "Se trimite semnarea...";
          const signature = $("signature").value.trim();

          const r = await fetch(`/flows/${encodeURIComponent(flow)}/sign`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ token, signature }),
          });

          const j = await r.json().catch(() => ({}));
          if (!r.ok) throw new Error(j?.error || "server_error");

          $("result").textContent = "✅ Semnat. Se actualizează status...";
          await loadFlow();

          if (j.nextLink) {
            $("result").innerHTML = `✅ Semnat. Următorul a fost notificat (dacă email e activ).<br/>NextLink (debug): <a href="${j.nextLink}" target="_blank">${j.nextLink}</a>`;
          }
        } catch (e) {
          showError(String(e.message || e));
          $("result").textContent = "";
        }
      });

      if (flow && token) {
        loadFlow().catch((e) => showError(String(e.message || e)));
      }
    </script>
  </body>
</html>
