# DocFlowAI — Security audit automat
# Rulat la fiecare push si PR pe main
# Esueaza build-ul daca sunt vulnerabilitati HIGH sau CRITICAL in dependente

name: Security Audit

on:
  push:
    branches: [ main, production, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Rulam saptamanal marti la 08:00 UTC
    - cron: '0 8 * * 2'

jobs:
  audit:
    name: npm audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Security audit (production deps — blochează la high/critical)
        run: npm audit --omit=dev --audit-level=high
        # Artefactul de productie e construit cu `npm ci --omit=dev` (vezi Dockerfile),
        # deci poarta blocanta auditeaza exact ce ruleaza in prod.
        # --audit-level=high: esueaza doar pe HIGH si CRITICAL.

      - name: Security audit (full tree — informativ, nu blochează)
        run: npm audit --audit-level=high || true
        # Auditeaza si devDependencies (build/test tooling). Advisory-urile de pe
        # sculele de dev raman vizibile in log, dar nu opresc deploy-ul (|| true).

      - name: Run syntax check
        run: npm run check

  test:
    name: Test suite
    runs-on: ubuntu-latest
    needs: audit

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: docflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      JWT_SECRET: test-jwt-secret-github-actions-2025
      NODE_ENV: test
      LOG_LEVEL: error
      TEST_DATABASE_URL: postgres://postgres:test@localhost:5432/docflow_test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Run test suite (mock)
        run: npm test

      - name: Run DB test suite (Postgres real)
        run: npm run test:db
